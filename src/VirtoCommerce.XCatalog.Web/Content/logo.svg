<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="XCatalog">
  <title>XCatalog</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#3FD8B4"/>
      <stop offset="100%" stop-color="#0E9E80"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#064F40" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(61,60)" filter="url(#lift)">
    <!-- Lids -->
    <polygon points="-34,-8 -4,-8 -12,-30 -42,-22" fill="#BDEFE2"/>
    <polygon points="4,-8 34,-8 44,-22 14,-30" fill="#9FE7D5"/>
    <!-- Products -->
    <rect x="-21" y="-26" width="15" height="22" rx="2.5" fill="#FFC24D"/>
    <rect x="-6" y="-32" width="15" height="28" rx="2.5" fill="#5FC8F5"/>
    <rect x="9" y="-24" width="15" height="20" rx="2.5" fill="#E5484D"/>
    <!-- Box front -->
    <path d="M-36,-8 L36,-8 L30,34 L-30,34 Z" fill="#ffffff"/>
    <path d="M-36,-8 L0,5 L36,-8 M0,5 V34" fill="none" stroke="#0E9E80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- GraphQL API badge -->
    <circle cx="30" cy="28" r="15" fill="#6A45D9"/>
    <g stroke="#ffffff" stroke-width="2.1"><line x1="30" y1="20" x2="23" y2="34"/><line x1="30" y1="20" x2="38" y2="33"/><line x1="23" y1="34" x2="38" y2="33"/></g>
    <circle cx="30" cy="20" r="3.1" fill="#ffffff"/>
    <circle cx="22.5" cy="34.5" r="3.1" fill="#ffffff"/>
    <circle cx="38" cy="33" r="3.1" fill="#ffffff"/>
  </g>
</svg>
